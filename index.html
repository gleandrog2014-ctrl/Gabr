<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel WRS - Portal Galáctico</title>
    <style>
        /* --- PADRÃO DE COR DA SUA GALERIA (#0048FF) --- */
        :root {
            --azul-wrs: #0048FF; 
            --azul-claro: #00d4ff;
            --azul-glow: rgba(0, 72, 255, 0.5);
            --azul-fundo: rgba(0, 72, 255, 0.1);
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .carrossel-wrs-container {
            width: 95%;
            max-width: 500px;
            height: 320px;
            position: relative;
            overflow: hidden;
            background: #000;
            border: 2px solid var(--azul-wrs);
            border-radius: 5px;
            box-shadow: 0 0 20px var(--azul-glow);
        }

        /* --- GRADE E SCANNER --- */
        .grid-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(var(--azul-fundo) 1px, transparent 1px),
                              linear-gradient(90deg, var(--azul-fundo) 1px, transparent 1px);
            background-size: 25px 25px;
            z-index: 1;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--azul-wrs);
            box-shadow: 0 0 15px var(--azul-wrs);
            opacity: 0.4;
            z-index: 5;
            animation: moveScan 5s linear infinite;
        }

        @keyframes moveScan {
            0% { top: -5%; }
            100% { top: 105%; }
        }

        /* --- ITENS DO CARROSSEL --- */
        .slide-item {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .slide-item.active { opacity: 1; }

        .slide-item img {
            max-width: 85%;
            max-height: 60%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--azul-wrs));
            z-index: 3;
        }

        /* --- TEXTO COM GRADIENTE ANIMADO --- */
        .legenda-wrs {
            margin-top: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            padding: 8px 20px;
            text-align: center;
            
            /* Efeito Gradiente */
            background: linear-gradient(to right, var(--azul-wrs), var(--azul-claro), #fff, var(--azul-claro), var(--azul-wrs));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-text 3s linear infinite;
            text-shadow: 0 0 10px rgba(0, 72, 255, 0.3);
        }

        @keyframes gradient-text {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* Botões de Navegação */
        .nav-wrs {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: var(--azul-wrs);
            border: 1px solid var(--azul-wrs);
            width: 40px;
            height: 40px;
            cursor: pointer;
            z-index: 10;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-wrs:hover {
            background: var(--azul-wrs);
            color: #fff;
            box-shadow: 0 0 20px var(--azul-wrs);
        }

        .prev { left: 10px; }
        .next { right: 10px; }

    </style>
</head>
<body>

    <div class="carrossel-wrs-container">
        <div class="grid-bg"></div>
        <div class="scan-line"></div>
        
        <div class="slide-item active">
            <img src="https://i.imgur.com/SFnk7A6.gif" alt="Destaque 1">
            <div class="legenda-wrs">PROJETO GALÁCTICO 01</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/KKY2zqU.gif" alt="Destaque 2">
            <div class="legenda-wrs">PROJETO GALÁCTICO 02</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/28xDTg0.gif" alt="Destaque 3">
            <div class="legenda-wrs">PROJETO GALÁCTICO 03</div>
        </div>
         
        <div class="slide-item">
            <img src="https://i.imgur.com/kSK0E1f.gif" alt="Destaque 4">
            <div class="legenda-wrs">PROJETO GALÁCTICO 04</div>
        </div>

        <button class="nav-wrs prev" onclick="mudarSlide(-1)">&#10094;</button>
        <button class="nav-wrs next" onclick="mudarSlide(1)">&#10095;</button>

    </div>

    <script>
        let index = 0;
        const slides = document.querySelectorAll('.slide-item');
        let timer;

        function mostrar(n) {
            slides[index].classList.remove('active');
            index = (n + slides.length) % slides.length;
            slides[index].classList.add('active');
        }

        function mudarSlide(n) {
            mostrar(index + n);
            resetTimer();
        }

        function startTimer() {
            timer = setInterval(() => {
                mostrar(index + 1);
            }, 4000);
        }

        function resetTimer() {
            clearInterval(timer);
            startTimer();
        }

        startTimer();
    </script>

</body>
</html>
