<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Neon Escuro - Galeria WRS</title>
    <style>
        /* --- ESTILO NEON AZUL ESCURO WRS --- */
        :root {
            /* NOVA COR: Azul Mais Escuro e Profundo */
            --neon-color: #0000cd; 
            --neon-glow: rgba(0, 0, 205, 0.7);
            --bg-dark: #000000;
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Evita barras de rolagem no body */
        }

        .carrossel-wrs {
            width: 90%;
            max-width: 500px;
            height: 300px; /* Aumentei um pouco a altura para acomodar o fundo */
            position: relative;
            overflow: hidden;
            /* Borda Neon Azul Escuro */
            border: 2px solid var(--neon-color); 
            border-radius: 15px;
            box-shadow: 0 0 20px var(--neon-glow), inset 0 0 15px var(--neon-glow);
            background: #010101; /* Fundo quase preto */
        }

        /* --- NOVO: Fundo Animado de Partículas (Preenchendo o Espaço) --- */
        .fundo-particulas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(var(--neon-color) 1px, transparent 1px),
                radial-gradient(var(--neon-color) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            opacity: 0.15; /* Bem sutil para não distrair */
            animation: piscarFundo 4s infinite alternate;
            z-index: 1; /* Atrás dos slides */
        }

        @keyframes piscarFundo {
            0% { opacity: 0.1; }
            100% { opacity: 0.25; }
        }

        .slide-item {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease-in-out; /* Transição mais suave */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2; /* À frente do fundo */
        }

        .slide-item.active { 
            opacity: 1; 
        }

        .slide-item img {
            max-width: 85%;
            max-height: 70%; /* Ajuste para equilibrar com a legenda */
            object-fit: contain;
            /* Brilho na Imagem/GIF (Sutil) */
            filter: drop-shadow(0 0 5px var(--neon-color));
        }

        .legenda {
            margin-top: 15px;
            color: var(--neon-color);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            /* Brilho no Texto */
            text-shadow: 0 0 10px var(--neon-color);
        }

        /* Botões de Navegação (Mais Escuros e Sutis) */
        .seta {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: var(--neon-color);
            border: 1px solid var(--neon-color);
            padding: 10px;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 0 5px var(--neon-glow);
            opacity: 0.7; /* Ligeiramente transparente por padrão */
        }

        .seta:hover { 
            background: var(--neon-color); 
            color: #000; 
            box-shadow: 0 0 15px var(--neon-color);
            opacity: 1;
        }

        .voltar { left: 10px; }
        .avancar { right: 10px; }
    </style>
</head>
<body>

    <div class="carrossel-wrs">
        
        <div class="fundo-particulas"></div>

        <div class="slide-item active">
            <img src="https://i.imgur.com/SFnk7A6.gif" alt="Destaque 1">
            <div class="legenda">PROJETO 01</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/KKY2zqU.gif" alt="Destaque 2">
            <div class="legenda">PROJETO 02</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/28xDTg0.gif" alt="Destaque 3">
            <div class="legenda">PROJETO 03</div>
        </div>
         
        <div class="slide-item">
            <img src="https://i.imgur.com/kSK0E1f.gif" alt="Destaque 4">
            <div class="legenda">PROJETO 04</div>
        </div>

        <button class="seta voltar" onclick="mudarSlide(-1)">&#10094;</button>
        <button class="seta avancar" onclick="mudarSlide(1)">&#10095;</button>

    </div>

    <script>
        let atual = 0;
        const slides = document.querySelectorAll('.slide-item');
        let autoSlide;

        function mostrar(n) {
            slides[atual].classList.remove('active');
            atual = (n + slides.length) % slides.length;
            slides[atual].classList.add('active');
        }

        function mudarSlide(n) {
            mostrar(atual + n);
            resetTimer(); 
        }

        function startTimer() {
            autoSlide = setInterval(() => {
                mudarSlide(1);
            }, 5000); // Aumentei para 5 segundos para apreciar o fundo
        }

        function resetTimer() {
            clearInterval(autoSlide);
            startTimer();
        }

        startTimer();
    </script>

</body>
</html>
