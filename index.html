<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrossel Neon - Galeria WRS</title>
    <style>
        /* --- ESTILO NEON AZUL WRS --- */
        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .carrossel-wrs {
            width: 90%;
            max-width: 500px;
            height: 280px;
            position: relative;
            overflow: hidden;
            /* Borda Neon Azul */
            border: 2px solid #00d4ff; 
            border-radius: 15px;
            box-shadow: 0 0 15px #00d4ff, inset 0 0 10px #00d4ff;
            background: #050505;
        }

        .slide-item {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .slide-item.active { 
            opacity: 1; 
        }

        .slide-item img {
            max-width: 85%;
            max-height: 65%;
            object-fit: contain;
            /* Brilho na Imagem/GIF */
            filter: drop-shadow(0 0 8px #00d4ff);
        }

        .legenda {
            margin-top: 15px;
            color: #00d4ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px #00d4ff;
        }

        /* Botões de Navegação */
        .seta {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #00d4ff;
            border: 1px solid #00d4ff;
            padding: 12px;
            cursor: pointer;
            z-index: 10;
            border-radius: 50%;
            transition: 0.3s;
            box-shadow: 0 0 5px #00d4ff;
        }

        .seta:hover { 
            background: #00d4ff; 
            color: #000; 
            box-shadow: 0 0 15px #00d4ff;
        }

        .voltar { left: 10px; }
        .avancar { right: 10px; }
    </style>
</head>
<body>

    <div class="carrossel-wrs">
        
        <div class="slide-item active">
            <img src="https://i.imgur.com/SFnk7A6.gif" alt="Destaque 1">
            <div class="legenda">PROJETO 01</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/KKY2zqU.gif" alt="Destaque 2">
            <div class="legenda">PROJETO 02</div>
        </div>

        <div class="slide-item">
            <img src="https://i.imgur.com/28xDTg0.gif" alt="Destaque 3">
            <div class="legenda">PROJETO 03</div>
        </div>
         
        <div class="slide-item">
            <img src="https://i.imgur.com/kSK0E1f.gif" alt="Destaque 4">
            <div class="legenda">PROJETO 04</div>
        </div>

        <button class="seta voltar" onclick="mudarSlide(-1)">&#10094;</button>
        <button class="seta avancar" onclick="mudarSlide(1)">&#10095;</button>

    </div>

    <script>
        let atual = 0;
        const slides = document.querySelectorAll('.slide-item');
        let autoSlide;

        function mostrar(n) {
            // Remove classe ativa do slide atual
            slides[atual].classList.remove('active');
            // Calcula o próximo índice
            atual = (n + slides.length) % slides.length;
            // Adiciona classe ativa ao novo slide
            slides[atual].classList.add('active');
        }

        function mudarSlide(n) {
            mostrar(atual + n);
            resetTimer(); // Reseta o tempo se alguém clicar manualmente
        }

        // Função para iniciar o movimento automático
        function startTimer() {
            autoSlide = setInterval(() => {
                mudarSlide(1);
            }, 4000); // 4000 = 4 segundos
        }

        function resetTimer() {
            clearInterval(autoSlide);
            startTimer();
        }

        // Inicia o carrossel automático ao carregar
        startTimer();
    </script>

</body>
</html>
